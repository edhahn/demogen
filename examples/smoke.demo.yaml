meta:
  name: smoke
  description: "Minimal example demo — visits a public page and narrates."

base_url: https://example.com

output:
  resolution:
    width: 1280
    height: 720
  quality: high

# Optional background music, mixed at low volume under the whole video.
# `path` is resolved relative to this script's directory. Generate a quick
# test track with:
#   ffmpeg -f lavfi -i "sine=frequency=220:duration=30" -y assets/bg.mp3
music:
  path: ./assets/bg.mp3
  volume: 0.12
  fade_in_ms: 800
  fade_out_ms: 2000

narration:
  voice: Samantha
  rate: 175
  clips:
    - id: title_vo
      text: "Welcome — here's a quick look at our example demo."
    - id: welcome
      text: "Welcome to our example demo."
    - id: closing
      text: "That concludes the smoke test."

scenes:
  # Card scenes are rendered from styled HTML — no browser. Place them
  # anywhere in `scenes`. Time a card either with a fixed `duration_ms` or,
  # like this one, with `wait_for_narration` so it holds until its voiceover
  # finishes (plus an optional `wait_after` tail).
  - type: card
    id: title
    kind: title
    headline: "Example Demo"
    subtitle: "A 30-second smoke test"
    wait_for_narration: title_vo   # voiceover clip — hold until it finishes
    wait_after: 800                # trailing pause after the voiceover (ms)
    fade: false            # the crossfade below owns this boundary

  - id: intro
    transition: crossfade  # dissolve from the title card into the browser
    steps:
      - action: narrate
        clip: welcome

      - action: goto
        value: /
        wait_for_narration: welcome
        wait_after: 1500

      - action: scroll
        value: down
        wait_after: 1000

  - id: outro
    transition: wipe       # wipe from the intro scene to the outro
    steps:
      - action: narrate
        clip: closing

      - action: wait
        condition: timeout
        timeout: 2000
        wait_for_narration: closing

  - type: card
    id: credits
    kind: credits
    transition: fade_black   # fade through black into the credits
    fade: false
    headline: "Thanks for watching"
    lines:
      - "Built with demogen"
      - "https://github.com/edhahn/demogen"
    duration_ms: 5000
